<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Сканер</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    #reader {
      width: 100%;
      max-width: 400px;
      margin: auto;
    }

    #siteView {
      display: none;
      width: 100%;
      height: 100vh;
      border: none;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h2>Сканируй штрих-код</h2>

<div id="reader"></div>

<iframe id="siteView"></iframe>

<button onclick="backToScanner()">← Назад к сканеру</button>

<script>
let lastScan = "";
let scanCooldown = false;

function onScanSuccess(decodedText) {
  if (decodedText === lastScan || scanCooldown) return;

  lastScan = decodedText;
  scanCooldown = true;

  let beep = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
  beep.play();

  let url = "https://milgreta.lt/index.php?route=product/search&search=" + decodedText;

  // показываем сайт внутри
  document.getElementById("reader").style.display = "none";
  let frame = document.getElementById("siteView");
  frame.style.display = "block";
  frame.src = url;

  setTimeout(() => {
    scanCooldown = false;
  }, 2000);
}

function backToScanner() {
  document.getElementById("siteView").style.display = "none";
  document.getElementById("reader").style.display = "block";
}

// быстрые настройки
let scanner = new Html5QrcodeScanner(
  "reader",
  {
    fps: 25,
    qrbox: { width: 300, height: 120 },
    aspectRatio: 1.777,
    experimentalFeatures: {
      useBarCodeDetectorIfSupported: true
    }
  }
);

scanner.render(onScanSuccess);
</script>

</body>
</html>
