<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Сканер товаров</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: black;
    }

    #reader {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>

<div id="reader"></div>

<script>
const html5QrCode = new Html5Qrcode("reader");

function startScanner() {
  html5QrCode.start(
    { facingMode: "environment" }, // задняя камера
    {
      fps: 15,
      qrbox: function(viewfinderWidth, viewfinderHeight) {
        let minEdge = Math.min(viewfinderWidth, viewfinderHeight);
        return {
          width: minEdge * 0.8,
          height: minEdge * 0.4
        };
      }
    },
    (decodedText) => {

      let url = "https://milgreta.lt/index.php?route=product/search&search=" + decodedText;

      window.location.href = url;
    },
    (error) => {
      // игнорируем ошибки
    }
  );
}

// сразу запускаем
startScanner();
</script>

</body>
</html>
