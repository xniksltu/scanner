<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Быстрый сканер</title>

  <!-- более быстрый режим -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    #reader {
      width: 100%;
      max-width: 400px;
      margin: auto;
    }

    h2 {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h2>Сканируй штрих-код</h2>

<div id="reader"></div>

<script>
let lastScan = "";
let scanCooldown = false;

function onScanSuccess(decodedText) {

  // защита от повторных сканов
  if (decodedText === lastScan || scanCooldown) return;

  lastScan = decodedText;
  scanCooldown = true;

  console.log("Скан:", decodedText);

  // 🔊 звук (как в норм сканере)
  let beep = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
  beep.play();

  // 🚀 сразу открываем сайт
  let url = "https://milgreta.lt/index.php?route=product/search&search=" + decodedText;
  window.location.href = url;

  // пауза чтобы не дергалось
  setTimeout(() => {
    scanCooldown = false;
  }, 2000);
}

// ⚡ быстрые настройки
let scanner = new Html5QrcodeScanner(
  "reader",
  {
    fps: 25, // быстрее
    qrbox: { width: 300, height: 120 }, // под штрихкод
    aspectRatio: 1.777, // широкая область
    experimentalFeatures: {
      useBarCodeDetectorIfSupported: true // ключ к скорости
    }
  }
);

scanner.render(onScanSuccess);
</script>

</body>
</html>
